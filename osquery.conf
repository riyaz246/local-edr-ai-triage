{
  "options": {
    "disable_events": "false",
    "disable_audit": "false",
    "audit_allow_config": "true",
    "audit_persist": "true",
    "host_identifier": "kali-vm"
  },
  "schedule": {
    "suspicious_processes": {
      "query": "SELECT p.name, p.pid, p.cmdline, pos.remote_port FROM processes AS p JOIN process_open_sockets AS pos ON p.pid = pos.pid WHERE p.name = 'bash' AND pos.remote_port != 0 AND pos.family = 2;",
      "interval": 30
    },
    "outbound_connections": {
      "query": "SELECT * FROM process_open_sockets WHERE remote_address != '0.0.0.0' AND family = 2;",
      "interval": 60
    }
  },
  "file_paths": {
    "suspicious_shells": [
      "/home/kali/.bash_history",
      "/root/.bash_history"
    ]
  }
}
